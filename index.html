<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Menarik - Klik Disini</title>

    <!-- BAGIAN KHUSUS AGAR GAMBAR MUNCUL DI FACEBOOK -->
    <meta property="og:title" content="Lihat Video Ini Sekarang!" />
    <meta property="og:description" content="Klik gambar untuk menonton konten lengkapnya." />
    <!-- Gunakan link gambar yang jelas (bukan random seed jika ingin stabil, tapi saya pakai link picsum fixed) -->
    <meta property="og:image" content="https://picsum.photos/seed/omg10/1200/630" />
    <meta property="og:url" content="https://iwanzy34-art.github.io/angel/" />
    <meta property="og:type" content="website" />
    <!-- SELESAI META TAGS -->

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #121212;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card-container {
            position: relative;
            width: 90%;
            max-width: 500px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .card-container:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
        }

        .card-image {
            width: 100%;
            height: auto;
            display: block;
            min-height: 400px;
            object-fit: cover;
            filter: brightness(0.9);
            transition: filter 0.3s ease;
        }

        .card-container:hover .card-image {
            filter: brightness(1.1);
        }

        .click-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
            cursor: pointer;
        }

        .click-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 14px;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.3s ease;
        }

        .card-container:hover .click-hint {
            background-color: #ff4757;
            border-color: #ff4757;
            transform: translateX(-50%) scale(1.1);
        }
    </style>
</head>
<body>

    <div class="card-container">
        <!-- Gambar yang sama dengan yang ada di Meta Tag Facebook agar konsisten -->
        <img src="https://picsum.photos/seed/omg10/600/800" alt="Gambar Menarik" class="card-image">

        <div class="click-hint">Klik Untuk Melihat</div>

        <a href="https://omg10.com/4/10987615" class="click-overlay" target="_blank"></a>
    </div>

</body>
</html>
