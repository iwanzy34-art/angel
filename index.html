<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Spin Undian - Cepat & Keren</title>
  <style>
    * { box-sizing: border-box; user-select: none; }
    body {
      background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: rgba(255,248,225,0.95);
      border-radius: 72px;
      padding: 20px 24px 32px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.4);
      text-align: center;
      max-width: 700px;
      width: 100%;
    }
    h1 { margin: 0 0 8px; font-size: 2rem; background: linear-gradient(135deg, #c79a2e, #f5c542); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .sub { color: #5a3e1b; margin-bottom: 20px; border-bottom: 1px dashed #d4b87a; display: inline-block; padding-bottom: 5px; }
    .wheel-container { position: relative; margin: 0 auto; width: min(85vw, 85vh, 480px); height: min(85vw, 85vh, 480px); }
    canvas { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; border-radius: 50%; box-shadow: 0 12px 28px rgba(0,0,0,0.5), 0 0 0 8px #f9e0a0, 0 0 0 12px #b87c2e; }
    .pointer { position: absolute; top: -28px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 24px solid transparent; border-right: 24px solid transparent; border-top: 52px solid #ffd966; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); z-index: 10; }
    .pointer::after { content: "⬤"; position: absolute; top: -58px; left: -12px; font-size: 28px; color: #c2410c; }
    .btn-spin { margin-top: 32px; background: radial-gradient(circle at 30% 10%, #f3b33d, #e07c1f); border: none; padding: 14px 35px; font-size: 1.7rem; font-weight: bold; color: #2c1a0a; border-radius: 60px; cursor: pointer; box-shadow: 0 8px 0 0 #8b4b1a; transition: 0.07s linear; }
    .btn-spin:active { transform: translateY(4px); box-shadow: 0 4px 0 0 #8b4b1a; }
    .btn-spin:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }
    .result-box { margin-top: 28px; background: #2d2218; padding: 12px 20px; border-radius: 50px; color: #ffecb3; font-size: 1.5rem; font-weight: bold; display: inline-block; min-width: 200px; }
    footer { margin-top: 20px; font-size: 0.7rem; color: #956e34; }
  </style>
</head>
<body>
<div class="card">
  <h1>🎡 SPIN UNDIAN</h1>
  <div class="sub">✨ klik roda & menangkan hadiah ✨</div>
  <div class="wheel-container">
    <canvas id="wheelCanvas" width="600" height="600"></canvas>
    <div class="pointer"></div>
  </div>
  <button class="btn-spin" id="spinBtn">🔁 SPIN</button>
  <div class="result-box" id="resultBox">🎲 <span id="resultText">Siap spin?</span></div>
  <footer>📋 Setting hadiah & bobot di Google Sheet (tanpa ubah kode)</footer>
</div>

<script>
  // Ganti dengan URL Web App dari Google Apps Script
  const API_BASE = "https://script.google.com/macros/s/AKfycbw1bGO7nDoVySdbYVQpXFURZ4Gw5140vUanhb5Fpc684WT8z_uxO52Ftsa_MJqQhnI/exec";

  let prizes = [];        // array segmen dengan startAngle, endAngle, name, color
  let totalWeight = 0;
  let currentRotation = 0;
  let animating = false;
  let animationId = null;
  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  const spinBtn = document.getElementById('spinBtn');
  const resultSpan = document.getElementById('resultText');

  const colorPalette = [
    '#FF6B6B','#4ECDC4','#FFE66D','#FF9F4A','#C77DFF','#6C91B2',
    '#F4A261','#E9C46A','#2A9D8F','#E76F51','#D4A5A5','#9C89B8',
    '#70AE6E','#F6AE9A','#B56576','#6D597A'
  ];

  function resizeCanvas() {
    const container = document.querySelector('.wheel-container');
    const size = container.clientWidth;
    canvas.width = size;
    canvas.height = size;
    drawWheel();
  }
  window.addEventListener('resize', () => resizeCanvas());

  function drawWheel() {
    if (!ctx || prizes.length === 0) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.font = "bold 16px 'Segoe UI'";
      ctx.fillStyle = "#3e2a1f";
      ctx.fillText("Memuat data...", canvas.width/2-80, canvas.height/2);
      return;
    }
    const w = canvas.width, h = canvas.height;
    const cx = w/2, cy = h/2;
    const rad = w/2 * 0.92;
    ctx.clearRect(0, 0, w, h);
    for (let i = 0; i < prizes.length; i++) {
      const seg = prizes[i];
      let start = seg.startAngle + currentRotation;
      let end = seg.endAngle + currentRotation;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, rad, start, end);
      ctx.closePath();
      ctx.fillStyle = seg.color;
      ctx.fill();
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(start + (seg.endAngle - seg.startAngle)/2 + currentRotation);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      let text = seg.name.length > 14 ? seg.name.slice(0,12)+".." : seg.name;
      ctx.font = `bold ${Math.max(12, Math.min(18, rad/12))}px "Segoe UI"`;
      ctx.fillStyle = "#1e2a1a";
      ctx.fillText(text, rad*0.7, 6);
      ctx.restore();
    }
    ctx.beginPath();
    ctx.arc(cx, cy, rad*0.12, 0, 2*Math.PI);
    ctx.fillStyle = "#F9C74F";
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy, rad*0.07, 0, 2*Math.PI);
    ctx.fillStyle = "#F9844A";
    ctx.fill();
  }

  // Membangun segmen dari data settings (dari API)
  function buildSegments(settings, totalWeight) {
    let segs = [];
    let curStart = 0;
    for (let i = 0; i < settings.length; i++) {
      let angleSize = (settings[i].weight / totalWeight) * 2 * Math.PI;
      segs.push({
        name: settings[i].name,
        weight: settings[i].weight,
        startAngle: curStart,
        endAngle: curStart + angleSize,
        color: colorPalette[i % colorPalette.length]
      });
      curStart += angleSize;
    }
    return segs;
  }

  // Fungsi untuk mendapatkan indeks hadiah berdasarkan rotasi roda
  function getPrizeIndexFromRotation(rotationRad) {
    if (prizes.length === 0) return -1;
    const pointerAngle = -Math.PI / 2;
    let rawAngle = pointerAngle - rotationRad;
    rawAngle = ((rawAngle % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
    for (let i = 0; i < prizes.length; i++) {
      if (rawAngle >= prizes[i].startAngle && rawAngle < prizes[i].endAngle) return i;
    }
    return 0;
  }

  // Animasi spin menuju indeks target
  function animateSpinToIndex(targetIndex, finalCallback) {
    if (animating) return;
    animating = true;
    spinBtn.disabled = true;
    const targetSeg = prizes[targetIndex];
    const midTargetAngle = targetSeg.startAngle + (targetSeg.endAngle - targetSeg.startAngle)/2;
    let targetRotation = (-Math.PI/2) - midTargetAngle;
    targetRotation = ((targetRotation % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
    const extraSpins = 6 * 2 * Math.PI;
    let delta = targetRotation - currentRotation;
    let finalRotation = currentRotation + extraSpins + ((delta + 2*Math.PI) % (2*Math.PI));
    const duration = 1800;
    const startTime = performance.now();
    const startRotation = currentRotation;
    function step(now) {
      let t = Math.min(1, (now - startTime)/duration);
      let ease = 1 - Math.pow(1-t, 3);
      const newRotation = startRotation + (finalRotation - startRotation) * ease;
      currentRotation = newRotation % (2*Math.PI);
      drawWheel();
      if (t < 1) {
        animationId = requestAnimationFrame(step);
      } else {
        currentRotation = targetRotation;
        drawWheel();
        animating = false;
        spinBtn.disabled = false;
        if (finalCallback) finalCallback();
        cancelAnimationFrame(animationId);
        animationId = null;
      }
    }
    if (animationId) cancelAnimationFrame(animationId);
    animationId = requestAnimationFrame(step);
  }

  // Load data hadiah dari API (GET)
  async function loadSettings() {
    resultSpan.innerText = "Memuat hadiah...";
    try {
      const response = await fetch(API_BASE, { mode: 'cors' });
      const data = await response.json();
      if (!data.settings || data.settings.length === 0) {
        resultSpan.innerText = "⚠️ Tidak ada hadiah. Isi sheet SpinSettings";
        prizes = [];
        drawWheel();
        spinBtn.disabled = false;
        return;
      }
      totalWeight = data.totalWeight;
      prizes = buildSegments(data.settings, totalWeight);
      currentRotation = 0;
      drawWheel();
      resultSpan.innerHTML = "🎉 Siap spin!";
      spinBtn.disabled = false;
    } catch (err) {
      console.error(err);
      resultSpan.innerText = "Gagal ambil data dari server. Cek koneksi.";
      spinBtn.disabled = false;
    }
  }

  // Proses spin: panggil API POST
  async function spinWheel() {
    if (animating) {
      resultSpan.innerText = "Tunggu spin selesai...";
      return;
    }
    if (prizes.length === 0) {
      resultSpan.innerText = "❌ Belum ada hadiah, muat ulang halaman.";
      return;
    }
    resultSpan.innerText = "🎲 Memutar...";
    spinBtn.disabled = true;
    try {
      const response = await fetch(API_BASE, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'application/json' }
      });
      const result = await response.json();
      if (!result || result.index === undefined) throw new Error("Gagal spin");
      const targetIdx = result.index;
      if (targetIdx >= prizes.length) throw new Error("Indeks tidak valid");
      animateSpinToIndex(targetIdx, () => {
        resultSpan.innerHTML = `🏆 ${prizes[targetIdx].name} 🏆`;
        if (navigator.vibrate) navigator.vibrate(200);
      });
    } catch (err) {
      console.error(err);
      resultSpan.innerText = "❌ Gagal hubungi server. Coba lagi.";
      spinBtn.disabled = false;
    }
  }

  // Inisialisasi
  function init() {
    resizeCanvas();
    spinBtn.addEventListener('click', spinWheel);
    loadSettings();
  }
  init();
</script>
</body>
</html>
